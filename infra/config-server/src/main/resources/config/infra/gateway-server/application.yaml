server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: main-service-route
          uri: lb://main-service
          predicates:
            - Path=/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    registry-fetch-interval-seconds: 2

management:
  endpoints:
    web:
      exposure:
        include: gateway
  endpoint:
    gateway:
      enabled: true